# GitHub Documentation can be found at: https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-githubs-form-schema
name: Feature request
description: Suggest a new capability

body:
                    
      - type: textarea
        id: current
        attributes:
              label: Description

      - type: textarea
        id: expected
        attributes:
              label: Expected Behaviour

      - type: textarea
        id: reproduce
        attributes:
              label: To Reproduce


      - type: markdown
        attributes:
              value: "### Please apply the following! <br> "
      - type: markdown
        attributes:
              value: "### <br> --- Type --- <br>"
      - type: markdown
        attributes:
              value: "**Enhancement**"
      - type: markdown
        attributes:
              value: "### <br> --- Labels --- <br>"
      - type: markdown
        attributes:
              value: "**Module(s)** <br> **Priority**"
      - type: markdown
        attributes:
              value: "<br> Thank you! Please edit the issue after submission to remove any blank or unused sections."
