# GitHub Documentation can be found at: https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-githubs-form-schema
name: Feature request
description: Suggest a new capability

body:

      - type: textarea
        id: actual
        attributes:
              label: Description
        validations:
              required: true


      - type: textarea
        id: expected
        attributes:
              label: Expected Behaviour
        validations:
              required: true


      - type: textarea
        id: reproduce
        attributes:
              label: To Reproduce
        validations:
              required: true

      - type: markdown
        attributes:
              value: "### Please apply the following!"
      - type: markdown
        attributes:
              value: "#### Type - Enhancement"
      - type: markdown
        attributes:
              value: "#### Module(s) + Priority"
