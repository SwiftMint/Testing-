name: Feature request
description: Suggest a new capability
body:
- type: textarea
  id:  description
  attributes:
    label: Describe the issue clearly and concisely.
    tip:  "If you don't have all the information yet, that's okay!"
    placeholder: "<Insert Wonderful Issue Here>"
- type: checkboxes
  id: module
  attributes:
    label:  Which modules are involved?
    options:
      - label: Objective Tracker (Focus)
        required: false
      - label: Minimap (Vista)
        required: true
