# GitHub Documentation can be found at: https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-githubs-form-schema
name: Feature request
description: Suggest a new capability

body:

      - type: markdown
        attributes:
              value: |
                    Filling out reports that are lacking in significant detail will lead to frustration on both your and the developer's ends.
                    Do not abuse this privilege.
                    
                    None of the below fields are required as there are always edge cases where they are not needed.
                    Please edit the final issue to remove these sections so as to reduce visual clutter.

                    
      - type: textarea
        id: actual
        attributes:
              label: Description
        validations:
              required: true


      - type: textarea
        id: expected
        attributes:
              label: Expected Behaviour
        validations:
              required: true


      - type: textarea
        id: reproduce
        attributes:
              label: To Reproduce
        validations:
              required: true



      - type: markdown
        attributes:
              value: "### Please apply the following!"
      - type: markdown
        attributes:
              value: "**Type** - **Enhancement**"
      - type: markdown
        attributes:
              value:  "**Module(s)**"
      - type: markdown
        attributes:
              value:  "**Priority**"
